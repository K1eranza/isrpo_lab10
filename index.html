<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube Clone</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="header">
        <div class="header-left">
            <button class="menu-btn">☰</button>
            <div class="logo">
                <span class="logo-icon">▶️</span>
                <span class="logo-text">YouTube</span>
            </div>
        </div>
        
        <div class="header-center">
            <input type="text" placeholder="Поиск" class="search-input" />
            <button class="search-btn">🔍</button>
        </div>
        
        <div class="header-right">
            <button class="create-btn">➕</button>
            <button class="notifications-btn">🔔</button>
            <img src="https://via.placeholder.com/32" alt="Avatar" class="avatar" />
        </div>
    </header>

    <div class="content">
        <aside class="sidebar">
            <nav class="sidebar-nav">
                <a href="#" class="nav-link active">
                    <span class="nav-icon">🏠</span>
                    <span class="nav-text">Главная</span>
                </a>
                <a href="#" class="nav-link">
                    <span class="nav-icon">🔥</span>
                    <span class="nav-text">В тренде</span>
                </a>
                <a href="#" class="nav-link">
                    <span class="nav-icon">📧</span>
                    <span class="nav-text">Подписки</span>
                </a>
                <a href="#" class="nav-link">
                    <span class="nav-icon">📚</span>
                    <span class="nav-text">Библиотека</span>
                </a>
                <hr class="divider">
                <a href="#" class="nav-link">
                    <span class="nav-icon">⏰</span>
                    <span class="nav-text">История</span>
                </a>
                <a href="#" class="nav-link">
                    <span class="nav-icon">👍</span>
                    <span class="nav-text">Понравилось</span>
                </a>
            </nav>
        </aside>
                <main class="main">
            <div class="chips">
                <button class="chip active">Все</button>
                <button class="chip">Музыка</button>
                <button class="chip">Игры</button>
                <button class="chip">Новости</button>
                <button class="chip">Спорт</button>
                <button class="chip">Образование</button>
                <button class="chip">Технологии</button>
            </div>
             <div class="video-grid">
                <article class="video-card">
                    <div class="thumbnail">
                        <img src="https://via.placeholder.com/280x158" alt="Video thumbnail">
                        <span class="duration">22:15</span>
                    </div>
                    <div class="video-info">
                        <img src="https://via.placeholder.com/36" alt="Channel avatar" class="channel-avatar">
                        <div class="video-details">
                            <h3 class="video-title">Обучающее видео по программированию на языке Python</h3>
                            <p class="channel-name">Code School</p>
                            <p class="video-meta">890 тыс. просмотров • 3 дня назад</p>
                        </div>
                    </div>
                </article>

                <article class="video-card">
                    <div class="thumbnail">
                        <img src="https://via.placeholder.com/280x158" alt="Video thumbnail">
                        <span class="duration">15:30</span>
                    </div>
                    <div class="video-info">
                        <img src="https://via.placeholder.com/36" alt="Channel avatar" class="channel-avatar">
                        <div class="video-details">
                            <h3 class="video-title">Топ 10 лучших игр 2024 года</h3>
                            <p class="channel-name">Game Channel</p>
                            <p class="video-meta">1.2 млн просмотров • 1 неделю назад</p>
                        </div>
                    </div>
                </article>
